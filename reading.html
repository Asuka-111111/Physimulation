<!DOCTYPE html>

<html lang="en">

<head>
        <meta charset="utf-8" />
        <meta content="width=device-width, initial-scale=1.0" name="viewport" />
        <title></title>
        <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
        <link href="https://fonts.bunny.net/css?family=inter:400,600&family=montserrat:700,800,900" rel="stylesheet" />
        <link href="https://cdn.jsdelivr.net/npm/material-symbols@latest/outlined.css" rel="stylesheet" />
        <script src="tailwind.config.js"></script>
        <link href="styles.css" rel="stylesheet" />
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" />
        <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
        <script src="reading.js" defer></script>
</head>

<body class="bg-surface text-on-surface font-body-md antialiased min-h-screen pt-20">
        <!-- TopNavBar -->
        <nav class="fixed top-0 w-full z-50 bg-surface border-b border-outline/30 flat no shadows text-primary">
                <div
                        class="flex justify-between items-center h-20 px-margin-desktop w-full max-w-container-max mx-auto">
                        <a href="index.html"
                                class="font-headline-md text-headline-md font-black tracking-tighter text-on-surface"
                                data-brand></a>
                </div>
        </nav>
        <!-- Main Content Canvas -->
        <main class="max-w-container-max mx-auto px-margin-mobile md:px-margin-desktop pt-12 pb-section-gap">
                <!-- Breadcrumbs -->
                <div
                        class="font-caption text-caption text-on-surface-variant uppercase tracking-widest mb-8 flex items-center space-x-2">
                        <a href="index.html" class="hover:text-primary transition-colors" data-brand></a>
                        <span class="text-outline/50">/</span>
                        <span id="bc-topic"></span>
                        <span class="text-outline/50">/</span>
                        <span id="bc-article" class="text-primary font-semibold"></span>
                </div>
                <!-- Article Header -->
                <header class="mb-12 max-w-4xl">
                        <h1 id="article-title"
                                class="font-display-lg-mobile md:font-display-lg text-display-lg-mobile md:text-display-lg text-brand-navy mb-6">
                        </h1>
                        <div
                                class="flex items-center text-on-surface-variant font-label-md text-label-md uppercase tracking-wider border-t border-outline/20 pt-4 mt-8 relative">
                                <div class="grid-intersection"></div>
                                <span id="article-meta"></span>
                        </div>
                </header>
                <!-- Hero Image -->
                <div class="w-full h-[400px] md:h-[600px] mb-16 border border-outline/30 relative">
                        <div class="grid-intersection"></div>
                        <div class="grid-intersection-right"></div>
                        <img id="hero-img"
                                class="w-full h-full object-cover grayscale hover:grayscale-0 transition-all duration-700"
                                src="" />
                </div>
                <!-- Article Layout Grid -->
                <div class="grid grid-cols-1 md:grid-cols-12 gap-gutter">
                        <!-- Main Content Column -->
                        <article id="article-body" class="md:col-span-8 pr-0 md:pr-12 text-on-surface"></article>
                        <!-- Sidebar -->
                        <aside class="md:col-span-4 mt-12 md:mt-0">
                                <div class="bg-surface-container-low border border-outline/30 p-8 relative">
                                        <div class="grid-intersection"></div>
                                        <h3
                                                class="font-headline-md text-headline-md text-brand-navy mb-6 uppercase tracking-tight">
                                                Key Takeaways</h3>
                                        <div id="key-takeaways" class="space-y-6"></div>
                                </div>
                        </aside>
                </div>
                <!-- Related Insights -->
                <section class="mt-24 border-t border-outline/30 pt-12 relative">
                        <div class="grid-intersection"></div>
                        <h2 class="font-headline-lg text-headline-lg text-brand-navy mb-8">Related Intelligence</h2>
                        <div id="related-articles" class="grid grid-cols-1 md:grid-cols-3 gap-8"></div>
                </section>
        </main>
        <!-- Footer -->
        <footer class="bg-surface-container-lowest w-full py-12 border-t border-outline/20">
                <div class="px-margin-desktop w-full max-w-container-max mx-auto">
                        <a href="index.html"
                                class="font-headline-sm text-headline-sm font-bold text-on-surface uppercase tracking-tight"
                                data-brand></a>
                </div>
        </footer>
</body>

</html>
